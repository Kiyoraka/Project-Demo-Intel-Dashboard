<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demand &amp; Network — Maraliner Intel Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" />
  <link rel="stylesheet" href="../libs/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/layout-dashboard.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div class="app-container">
    <div data-partial="sidebar"></div>
    <div class="main-content">
      <div data-partial="topbar"></div>
      <div class="page-content">
        <section id="kpi-strip" class="kpi-strip"></section>
        <div class="dashboard-grid asymmetric">
          <div class="card">
            <div class="card-header">
              <h3>Route x Hour Load Heatmap</h3>
              <div class="card-actions">
                <small style="color: var(--text-muted);">Gold = low, Crimson = full</small>
              </div>
            </div>
            <div class="card-body">
              <div id="heatmap-host" class="heatmap"></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <h3>Top Routes by Load</h3>
              <div class="card-actions">
                <span class="badge badge-primary">Peak 89%</span>
              </div>
            </div>
            <div class="card-body">
              <div class="chart-host h-360">
                <canvas id="route-load-chart"></canvas>
              </div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3>Recommended Schedule Changes</h3>
            <div class="card-actions">
              <span class="badge badge-good" id="gains-badge">RM 0 projected</span>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Route</th>
                  <th>Change</th>
                  <th class="num">Projected</th>
                  <th>Cadence</th>
                </tr>
              </thead>
              <tbody id="suggestions-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../libs/chart.umd.min.js"></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth.js';
    import { initChrome } from '../assets/js/partials.js';
    import { renderDemandPage } from '../assets/js/pages/demand.js';

    requireAuth();
    initChrome('Demand & Network Utilisation').then(() => renderDemandPage());
  </script>
</body>
</html>
