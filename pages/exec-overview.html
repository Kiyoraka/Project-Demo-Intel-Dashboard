<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive Overview — Maraliner Intel Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" />
  <link rel="stylesheet" href="../libs/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/layout-dashboard.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div class="app-container">
    <div data-partial="sidebar"></div>
    <div class="main-content">
      <div data-partial="topbar"></div>
      <div class="page-content">
        <section id="kpi-strip" class="kpi-strip"></section>
        <div class="dashboard-grid asymmetric">
          <div class="card">
            <div class="card-header">
              <h3>Today's Top 10 Actions</h3>
              <div class="card-actions">
                <span class="badge badge-primary">Live</span>
              </div>
            </div>
            <ul id="action-feed" class="action-list"></ul>
          </div>
          <div class="card">
            <div class="card-header">
              <h3>Fleet Map</h3>
              <div class="card-actions">
                <span class="badge badge-neutral" id="fleet-in-motion-count">12 in motion</span>
              </div>
            </div>
            <div class="card-body">
              <div class="fleet-map" id="fleet-map-host"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3>Revenue Today vs Last 7 Days</h3>
            <div class="card-actions">
              <span class="badge badge-good">RM 128,440</span>
            </div>
          </div>
          <div class="card-body">
            <div class="chart-host h-280">
              <canvas id="revenue-chart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../libs/chart.umd.min.js"></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth.js';
    import { initChrome } from '../assets/js/partials.js';
    import { renderExecOverview } from '../assets/js/pages/exec-overview.js';

    requireAuth();
    initChrome('Executive Overview').then(() => renderExecOverview());
  </script>
</body>
</html>
