<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Visibility — Maraliner Intel Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" />
  <link rel="stylesheet" href="../libs/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/layout-dashboard.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div class="app-container">
    <div data-partial="sidebar"></div>
    <div class="main-content">
      <div data-partial="topbar"></div>
      <div class="page-content">
        <section id="kpi-strip" class="kpi-strip"></section>
        <div class="dashboard-grid asymmetric">
          <div class="card">
            <div class="card-header">
              <h3>30-Day Cash Flow</h3>
              <div class="card-actions">
                <span class="badge badge-primary">Revenue</span>
                <span class="badge badge-accent">Operating Cost</span>
              </div>
            </div>
            <div class="card-body">
              <div class="chart-host h-280">
                <canvas id="cashflow-chart"></canvas>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <h3>Route Profitability</h3>
              <div class="card-actions">
                <span class="badge badge-bad">1 route at loss</span>
              </div>
            </div>
            <div class="card-body">
              <div class="chart-host h-320">
                <canvas id="profit-chart"></canvas>
              </div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3>Top 10 Overdue Receivables</h3>
            <div class="card-actions">
              <span class="badge badge-warn" id="ar-total-badge">RM 0 total</span>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Client</th>
                  <th class="num">Outstanding</th>
                  <th class="num">Days</th>
                  <th>Bucket</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="receivables-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../libs/chart.umd.min.js"></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth.js';
    import { initChrome } from '../assets/js/partials.js';
    import { renderFinancePage } from '../assets/js/pages/finance.js';

    requireAuth();
    initChrome('Financial Visibility').then(() => renderFinancePage());
  </script>
</body>
</html>
