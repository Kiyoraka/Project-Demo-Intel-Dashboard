<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Maraliner Intel Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" />
  <link rel="stylesheet" href="libs/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout-public.css" />
</head>
<body>
  <div class="public-shell">
    <form id="login-form" class="login-card" novalidate>
      <div class="logo-block">
        <img src="assets/img/logo.svg" alt="Maraliner" />
        <div class="tagline">Bus Operations Intel Platform</div>
      </div>

      <div id="error-banner" class="error-banner" role="alert"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          placeholder="admin@gmail.com"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          required
          placeholder="admin123"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">
        <i class="fa-solid fa-right-to-bracket"></i>
        Sign In
      </button>

      <div class="demo-hint">
        Demo: admin@gmail.com / admin123
      </div>
    </form>

    <div class="public-footer">
      Powered by T-Nex
      <span class="dot">&bull;</span>
      v0.1 Pitch Demo
    </div>
  </div>

  <script type="module">
    import { login, requireGuest } from './assets/js/auth.js';

    requireGuest();

    const form = document.getElementById('login-form');
    const errorBanner = document.getElementById('error-banner');

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      errorBanner.classList.remove('visible');
      errorBanner.textContent = '';

      const email = form.email.value;
      const password = form.password.value;
      const result = login(email, password);

      if (result.ok) {
        window.location.href = 'pages/exec-overview.html';
      } else {
        errorBanner.textContent = result.error;
        errorBanner.classList.add('visible');
      }
    });
  </script>
</body>
</html>
